# =========================================
# Sashwat Insurance - Application Properties
# =========================================

# Server
server.port=8081
server.servlet.context-path=/api

# =========================================
# MySQL Database Configuration
# =========================================
spring.datasource.url=jdbc:mysql://localhost:3306/sashwat_insurance?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=vedms1345
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# =========================================
# JWT Configuration
# =========================================
app.jwt.secret=sashwat_insurance_super_secret_key_change_this_in_production_must_be_long_enough
app.jwt.expiration-ms=86400000
# 86400000 ms = 24 hours

# =========================================
# Email Configuration (Gmail SMTP)
# Replace with your email credentials
# =========================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=placeholder@gmail.com
spring.mail.password=placeholder
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Company email for lead notifications
app.email.company-email=leads@sashwatinsurance.com
app.email.from-name=Sashwat Insurance

# =========================================
# CORS Configuration
# =========================================
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173,https://sashwatinsurance.com

# =========================================
# Swagger / OpenAPI
# =========================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# =========================================
# Logging
# =========================================
logging.level.com.sashwat=DEBUG
logging.level.org.springframework.security=INFO


spring.mail.properties.mail.smtp.connectiontimeout=1000
spring.mail.properties.mail.smtp.timeout=1000
